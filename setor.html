<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <section id="setor-content" class="conteudo-secao">
            <p class="section-titulo">Gestão de Setores</p>
            <div class="d-flex justify-content-end mb-3">
              <button class="btn btn-primary"><i class="bi bi-plus-circle me-2"></i>Novo Setor</button>
            </div>
            <div class="box">
              <div class="table-responsive">
                <table class="table table-hover tabela-patrimonios mb-0">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>Nome do Setor</th>
                      <th>Ações</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>1</td>
                      <td>T.I.</td>
                      <td><button class="btn btn-sm btn-warning"><i class="bi bi-pencil-square"></i></button></td>
                    </tr>
                    <tr>
                      <td>2</td>
                      <td>Financeiro</td>
                      <td><button class="btn btn-sm btn-warning"><i class="bi bi-pencil-square"></i></button></td>
                    </tr>
                    <tr>
                      <td>3</td>
                      <td>RH</td>
                      <td><button class="btn btn-sm btn-warning"><i class="bi bi-pencil-square"></i></button></td>
                    </tr>
                    <tr>
                      <td>4</td>
                      <td>Diretoria</td>
                      <td><button class="btn btn-sm btn-warning"><i class="bi bi-pencil-square"></i></button></td>
                    </tr>
                    <tr>
                      <td>5</td>
                      <td>Sala de Reunião</td>
                      <td><button class="btn btn-sm btn-warning"><i class="bi bi-pencil-square"></i></button></td>
                    </tr>
                    <tr>
                      <td>6</td>
                      <td>Coordenação</td>
                      <td><button class="btn btn-sm btn-warning"><i class="bi bi-pencil-square"></i></button></td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </section>
</body>
</html>

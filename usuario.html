<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<section id="usuarios-content" class="conteudo-secao ativo container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3 gap-2 flex-wrap">
        <div class="input-group" style="max-width: 380px;">
            <span class="input-group-text bg-white">
                <i class="bi bi-search text-secondary"></i>
            </span>
            <input type="text" class="form-control" id="campoPesquisaUsuario"
                placeholder="Pesquisar por nome ou matrícula..."
                oninput="filtrarUsuarios()">
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalNovoUsuario">
            <i class="bi bi-person-plus-fill me-2"></i>Incluir Usuário
        </button>
    </div>

    <div class="card">
        <div class="card-header bg-secondary text-white">
            <h5 class="mb-0"><i class="bi bi-people-fill me-2"></i>Usuários Cadastrados</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Nome</th>
                            <th>Matrícula</th>
                            <th>Perfil</th>
                            <th>Status</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaUsuarios">
                        <tr>
                            <td colspan="5" class="text-center text-muted py-4">
                                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                Carregando usuários...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="msgNenhumResultado" class="text-center text-muted mt-3 d-none">
        <i class="bi bi-person-x fs-4"></i>
        <p class="mt-1">Nenhum usuário encontrado.</p>
    </div>
</section>

          <!-- ========== MODAL NOVO USUÁRIO ========== -->
  <div class="modal fade" id="modalNovoUsuario" tabindex="-1" aria-labelledby="modalNovoUsuarioLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalNovoUsuarioLabel">Incluir Novo Usuário</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="formNovoUsuario">
            <div class="row">
              <div class="col-md-12 mb-3">
                <label class="form-label">Nome Completo</label>
                <input type="text" class="form-control" placeholder="Digite o nome completo" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Matrícula</label>
                <input type="text" class="form-control" placeholder="12345" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Senha</label>
                <input type="password" class="form-control" placeholder="Senha" required>
              </div>
              <div class="col-md-12 mb-3">
                <label class="form-label">Perfil</label>
                 <select class="form-select" id="novoPerfil" required>
    <option value="">Selecione...</option>
    <option value="A">Administrador</option>
    <option value="O">Operador</option>
    <option value="V">Visualizador</option>
                </select>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" onclick="salvarUsuario()">
            <i class="bi bi-check-lg me-1"></i>Salvar Usuário
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== MODAL EDITAR USUÁRIO ========== -->
  <div class="modal fade" id="modalEditarUsuario" tabindex="-1" aria-labelledby="modalEditarUsuarioLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalEditarUsuarioLabel">Editar Usuário</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="formEditarUsuario">
            <div class="row">
              <div class="col-md-12 mb-3">
                <label class="form-label">Nome Completo</label>
                <input type="text" class="form-control" value="Luís Miguel" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Matrícula</label>
                <input type="text" class="form-control" value="12345" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Nova Senha (Opcional)</label>
                <input type="password" class="form-control" placeholder="Deixe em branco para não alterar">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Perfil</label>
                 <select class="form-select" id="editarPerfil" required>
                  <option value="">Selecione...</option>
                  <option value="A" selected>Administrador</option>
                  <option value="O">Operador</option>
                  <option value="V">Visualizador</option>
                 </select>
              </div>
              <div class="col-md-6 mb-3 d-flex align-items-end">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" role="switch" id="switchStatusUsuario" checked>
                  <label class="form-check-label" for="switchStatusUsuario">Usuário Ativo</label>
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" form="formEditarUsuario" class="btn btn-primary">Salvar Alterações</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

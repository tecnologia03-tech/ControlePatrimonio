<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<section id="usuarios-content" class="conteudo-secao ativo container mt-4">

    <!-- ===================== CABECALHO DA LISTAGEM ===================== -->
<div class="d-flex justify-content-between align-items-center mb-3">
  <input
    type="text"
    id="buscaUsuario"
    class="input-busca-usuario"
    placeholder="Pesquisar por nome ou matrícula..."
    oninput="filtrarUsuarios()"
  >

  <button class="btn btn-primary btn-sm" onclick="abrirModalIncluirUsuario()">
    <i class="bi bi-person-plus-fill me-1"></i> Incluir Usuário
  </button>
</div>

<!-- ===================== CAIXA DA LISTAGEM ===================== -->
<div class="usuarios-header-box">
  <div class="usuarios-titulo-box">
    <i class="bi bi-people-fill"></i>
    <span>Usuários Cadastrados</span>
  </div>
</div>

<div class="tabela-usuarios-box">
  <div class="table-responsive">
    <table class="table mb-0 tabela-usuarios align-middle">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Matrícula</th>
          <th>Perfil</th>
          <th>Status</th>
          <th style="width: 160px;">Ações</th>
        </tr>
      </thead>
      <tbody id="tabelaUsuarios">
        <tr>
          <td colspan="5" class="text-center text-muted py-4">Carregando usuários...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ===================== MODAL DE INCLUSÃO ===================== -->
<div id="modalIncluirUsuario" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-header-custom">
      <h5>Incluir Novo Usuário</h5>
      <button type="button" class="btn-fechar-modal" onclick="fecharModalIncluirUsuario()">&times;</button>
    </div>

    <div class="modal-body-custom">
      <form id="formIncluirUsuario" onsubmit="return false;">
        <div class="mb-3">
          <label for="nomeUsuario" class="form-label">Nome Completo</label>
          <input type="text" id="nomeUsuario" class="form-control" placeholder="Digite o nome completo">
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label for="matriculaUsuario" class="form-label">Matrícula</label>
            <input type="text" id="matriculaUsuario" class="form-control" placeholder="12345">
          </div>

          <div class="col-md-6">
            <label for="senhaUsuario" class="form-label">Senha</label>
            <input type="password" id="senhaUsuario" class="form-control" placeholder="Senha">
          </div>
        </div>

        <div class="mb-3">
          <label for="perfilUsuario" class="form-label">Perfil</label>
          <select id="perfilUsuario" class="form-select">
            <option value="">Selecione...</option>
            <option value="A">Administrador</option>
            <option value="O">Operador</option>
            <option value="V">Visualizador</option>
          </select>
        </div>

        <p id="msgIncluirUsuario" class="text-danger small mb-0"></p>
      </form>
    </div>

    <div class="modal-footer-custom">
      <button type="button" class="btn btn-secondary" onclick="fecharModalIncluirUsuario()">Cancelar</button>
      <button type="button" class="btn btn-primary" onclick="salvarUsuario()">✓ Salvar Usuário</button>
    </div>
  </div>
</div>

<!-- ===================== MODAL DE EDIÇÃO ===================== -->
<div id="modalEditarUsuario" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-header-custom">
      <h5>Editar Usuário</h5>
      <button type="button" class="btn-fechar-modal" onclick="fecharModalEditarUsuario()">&times;</button>
    </div>

    <div class="modal-body-custom">
      <form id="formEditarUsuario" onsubmit="return false;">
        <input type="hidden" id="editUsuarioId">

        <div class="mb-3">
          <label for="editNomeUsuario" class="form-label">Nome Completo</label>
          <input type="text" id="editNomeUsuario" class="form-control" placeholder="Digite o nome completo">
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label for="editMatriculaUsuario" class="form-label">Matrícula</label>
            <input type="text" id="editMatriculaUsuario" class="form-control" placeholder="12345">
          </div>

          <div class="col-md-6">
            <label for="editSenhaUsuario" class="form-label">Nova Senha (Opcional)</label>
            <input type="password" id="editSenhaUsuario" class="form-control" placeholder="Senha">
          </div>
        </div>

        <div class="mb-3">
          <label for="editPerfilUsuario" class="form-label">Perfil</label>
          <select id="editPerfilUsuario" class="form-select">
            <option value="">Selecione...</option>
            <option value="A">Administrador</option>
            <option value="O">Operador</option>
            <option value="V">Visualizador</option>
          </select>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="editAtivoUsuario">
          <label class="form-check-label" for="editAtivoUsuario">Usuário Ativo</label>
        </div>

        <p id="msgEditarUsuario" class="text-danger small mb-0"></p>
      </form>
    </div>

    <div class="modal-footer-custom">
      <button type="button" class="btn btn-secondary" onclick="fecharModalEditarUsuario()">Cancelar</button>
      <button type="button" class="btn btn-primary" onclick="salvarEdicaoUsuario()">Salvar Alterações</button>
    </div>
  </div>
</div>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
